<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>

<body>

<div class="container">

    <h2>Student Management System</h2>

    <h3>Login</h3>
    {% if error %}
<p style="color:red;">
    {{ error }}
</p>
{% endif %}

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="password"
            placeholder="Enter Password"
            required>

        <button type="submit">
            Login
        </button>

    </form>

    <p>
        Don't have an account?
        <a href="/signup">Signup</a>
    </p>

</div>

</body>
</html>
