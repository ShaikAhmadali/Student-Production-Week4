<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="top-bar">

    <h3>Welcome, {{ username }}</h3>

    <a href="/logout">
        <button class="logout-btn">
            Logout
        </button>
    </a>

</div>

<hr>
    <h1>Student Management System</h1>

    <form id="studentForm">

        <label>Name</label><br>
        <input type="text" id="name" placeholder="Enter student name"><br><br>

        <label>Age</label><br>
        <input type="number" id="age" placeholder="Enter age"><br><br>

        <label>Course</label><br>
        <input type="text" id="course" placeholder="Enter course"><br><br>

        <button type="submit" class="add-btn">Add Student</button>

    </form>
    <p id="statusMessage"></p>
    <h2>Students List</h2>

<table id="studentTable">

    <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="studentList">

    </tbody>

</table>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
